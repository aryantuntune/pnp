<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="30">
    <title>Under Maintenance - SSMSPL Car Ferry</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0c1929 0%, #1a365d 40%, #234876 100%);
            color: #e2e8f0;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            padding: 2rem 1.5rem;
            max-width: 560px;
            width: 100%;
            z-index: 10;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon {
            font-size: 4.5rem;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
            line-height: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        h1 {
            font-size: 1.85rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.4rem;
            letter-spacing: -0.01em;
        }

        .company {
            font-size: 0.82rem;
            color: #90cdf4;
            margin-bottom: 2rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-weight: 500;
        }

        .message-box {
            padding: 1.5rem 2rem;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            margin-bottom: 2rem;
        }

        .message {
            font-size: 1.05rem;
            line-height: 1.65;
            color: #cbd5e0;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 0.5rem;
        }

        .dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #63b3ed;
            animation: pulse 1.4s ease-in-out infinite;
        }

        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1.15); }
        }

        .footer-note {
            font-size: 0.78rem;
            color: #4a6fa5;
            margin-top: 1rem;
        }

        /* Waves */
        .waves {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            z-index: 1;
        }

        .waves svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        @media (max-width: 480px) {
            .container { padding: 1.5rem 1rem; }
            h1 { font-size: 1.5rem; }
            .message { font-size: 0.95rem; }
            .icon { font-size: 3.5rem; }
            .message-box { padding: 1.2rem 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon" role="img" aria-label="Ferry">&#x26F4;&#xFE0F;</div>
        <h1>We'll Be Right Back</h1>
        <p class="company">Suvarnadurga Shipping &amp; Marine Services Pvt. Ltd.</p>
        <div class="message-box">
            <p class="message" id="message"></p>
        </div>
        <div class="dots">
            <span></span><span></span><span></span>
        </div>
        <p class="footer-note">This page refreshes automatically</p>
    </div>

    <div class="waves">
        <svg viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path fill="rgba(99,179,237,0.12)">
                <animate attributeName="d" dur="8s" repeatCount="indefinite"
                    values="M0,40 C360,100 720,0 1080,60 C1260,90 1380,30 1440,50 L1440,120 L0,120 Z;
                            M0,60 C360,0 720,100 1080,40 C1260,10 1380,70 1440,50 L1440,120 L0,120 Z;
                            M0,40 C360,100 720,0 1080,60 C1260,90 1380,30 1440,50 L1440,120 L0,120 Z"/>
            </path>
            <path fill="rgba(99,179,237,0.07)">
                <animate attributeName="d" dur="10s" repeatCount="indefinite"
                    values="M0,60 C240,20 480,80 720,40 C960,0 1200,80 1440,40 L1440,120 L0,120 Z;
                            M0,40 C240,80 480,20 720,60 C960,100 1200,20 1440,60 L1440,120 L0,120 Z;
                            M0,60 C240,20 480,80 720,40 C960,0 1200,80 1440,40 L1440,120 L0,120 Z"/>
            </path>
            <path fill="rgba(99,179,237,0.04)">
                <animate attributeName="d" dur="12s" repeatCount="indefinite"
                    values="M0,50 C180,80 360,20 540,50 C720,80 900,20 1080,50 C1260,80 1380,40 1440,55 L1440,120 L0,120 Z;
                            M0,55 C180,20 360,80 540,50 C720,20 900,80 1080,50 C1260,20 1380,60 1440,45 L1440,120 L0,120 Z;
                            M0,50 C180,80 360,20 540,50 C720,80 900,20 1080,50 C1260,80 1380,40 1440,55 L1440,120 L0,120 Z"/>
            </path>
        </svg>
    </div>

    <script>
        var messages = [
            "We're currently performing scheduled maintenance to improve your experience.",
            "Our team is working behind the scenes to make things better for you.",
            "We'll be back shortly. Thank you for your patience!",
            "Maintenance in progress \u2014 we're enhancing our services to serve you better.",
            "We're sprucing things up! Please check back in a few minutes.",
            "Our systems are being updated for a smoother experience.",
            "Hang tight! We're making improvements and will be back soon.",
            "We appreciate your patience while we perform essential maintenance.",
            "Our ferry booking services will resume shortly. Thank you for understanding.",
            "We're working hard to bring you an even better booking experience."
        ];
        var idx = Math.floor(Math.random() * messages.length);
        document.getElementById('message').textContent = messages[idx];
    </script>
</body>
</html>
