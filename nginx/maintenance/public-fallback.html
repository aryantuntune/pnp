<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="15">
    <title>SSMSPL Car Ferry - We'll Be Right Back</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0c1929 0%, #1a365d 50%, #2a4a7f 100%);
            color: #e2e8f0;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            padding: 2rem 1.5rem;
            max-width: 520px;
            width: 100%;
            z-index: 10;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1.2rem;
            animation: bob 2.5s ease-in-out infinite;
            line-height: 1;
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.3rem;
        }

        .brand {
            font-size: 0.85rem;
            color: #90cdf4;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .message {
            font-size: 1rem;
            line-height: 1.6;
            color: #a0b4cc;
            margin-bottom: 1.5rem;
        }

        .contact {
            font-size: 0.82rem;
            color: #5a7ea8;
        }

        .contact a {
            color: #63b3ed;
            text-decoration: none;
        }

        .dots {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin: 1rem 0;
        }

        .dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #63b3ed;
            animation: pulse 1.4s ease-in-out infinite;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1.15); }
        }

        /* Waves */
        .waves {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            z-index: 1;
        }

        .waves svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.3rem; }
            .icon { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon" role="img" aria-label="Ferry">&#x26F4;&#xFE0F;</div>
        <h1>We'll Be Right Back</h1>
        <p class="brand">SSMSPL Car Ferry</p>
        <p class="message" id="message"></p>
        <div class="dots">
            <span></span><span></span><span></span>
        </div>
        <p class="contact">Need help? Call us or visit our office for assistance.</p>
    </div>

    <div class="waves">
        <svg viewBox="0 0 1440 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path fill="rgba(99,179,237,0.1)">
                <animate attributeName="d" dur="7s" repeatCount="indefinite"
                    values="M0,35 C360,85 720,5 1080,50 C1260,75 1380,25 1440,45 L1440,100 L0,100 Z;
                            M0,55 C360,5 720,85 1080,35 C1260,15 1380,65 1440,45 L1440,100 L0,100 Z;
                            M0,35 C360,85 720,5 1080,50 C1260,75 1380,25 1440,45 L1440,100 L0,100 Z"/>
            </path>
            <path fill="rgba(99,179,237,0.06)">
                <animate attributeName="d" dur="9s" repeatCount="indefinite"
                    values="M0,55 C200,20 400,70 600,35 C800,0 1000,70 1200,35 C1350,15 1400,45 1440,40 L1440,100 L0,100 Z;
                            M0,35 C200,70 400,20 600,55 C800,90 1000,20 1200,55 C1350,75 1400,35 1440,50 L1440,100 L0,100 Z;
                            M0,55 C200,20 400,70 600,35 C800,0 1000,70 1200,35 C1350,15 1400,45 1440,40 L1440,100 L0,100 Z"/>
            </path>
        </svg>
    </div>

    <script>
        var messages = [
            "We'll be right back! Our website is taking a brief pause.",
            "We're making some quick improvements. Please check back shortly.",
            "Our website will be back in just a moment. Thank you for visiting!",
            "Brief maintenance in progress \u2014 we'll be right back.",
            "Our services will resume shortly. Thanks for your patience!"
        ];
        var idx = Math.floor(Math.random() * messages.length);
        document.getElementById('message').textContent = messages[idx];
    </script>
</body>
</html>
