# Docker DNS resolver — re-resolves container IPs dynamically.
# Without this, nginx caches IPs at startup and breaks when containers restart.
resolver 127.0.0.11 valid=10s ipv6=off;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name carferry.online www.carferry.online api.carferry.online;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# Frontend — carferry.online
# ============================================================
server {
    listen 443 ssl;
    server_name carferry.online www.carferry.online;

    ssl_certificate /etc/letsencrypt/live/carferry.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/carferry.online/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    client_max_body_size 10M;

    # Dynamic upstream variables (resolved per-request via Docker DNS)
    set $frontend_up http://frontend:3000;
    set $backend_up  http://backend:8000;

    # ----------------------------------------------------------
    # Maintenance mode detection
    # Flag files created by maintenance.sh / update.sh on the host:
    #   update.flag      → admin sees "updates underway", customer sees "under maintenance"
    #   maintenance.flag  → both see "under maintenance"
    # ----------------------------------------------------------
    set $maint_mode "none";
    if (-f /usr/share/nginx/maintenance/update.flag) {
        set $maint_mode "update";
    }
    if (-f /usr/share/nginx/maintenance/maintenance.flag) {
        set $maint_mode "maintenance";
    }

    # Security headers (applied to all locations that don't have their own add_header)
    include /etc/nginx/conf.d/security-headers.inc;

    # ==============================================================
    # Internal: maintenance page handler
    # Serves static HTML from /usr/share/nginx/maintenance/
    # sub_filter injects $maint_mode into the admin page's %%MODE%%
    # ==============================================================
    location /maint/ {
        internal;
        alias /usr/share/nginx/maintenance/;
        sub_filter_once on;
        sub_filter '%%MODE%%' $maint_mode;
        sub_filter_types text/html;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "no-cache, no-store" always;
        add_header Retry-After 300 always;
    }

    # ==============================================================
    # WebSocket for dashboard real-time stats
    # ==============================================================
    location /api/dashboard/ws {
        proxy_pass $backend_up;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ==============================================================
    # Static assets — cached in nginx, served stale during downtime
    # Ensures cached public pages don't break when frontend restarts
    # ==============================================================
    location /_next/static/ {
        proxy_pass $frontend_up;
        proxy_cache static_cache;
        proxy_cache_valid 200 365d;
        proxy_cache_use_stale error timeout http_502 http_503 http_504;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    location /_next/image {
        proxy_pass $frontend_up;
        proxy_cache static_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_use_stale error timeout http_502 http_503 http_504;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Cache-Status $upstream_cache_status;
    }

    location /images/ {
        proxy_pass $frontend_up;
        proxy_cache static_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_use_stale error timeout http_502 http_503 http_504;
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ==============================================================
    # Admin portal routes → maintenance page: admin.html
    # ==============================================================

    # Trailing-slash redirects (prevent fallthrough to public catch-all)
    location = /login/           { return 301 /login$is_args$args; }
    location = /forgot-password/ { return 301 /forgot-password$is_args$args; }
    location = /reset-password/  { return 301 /reset-password$is_args$args; }

    location = /login {
        if ($maint_mode != "none") {
            rewrite ^ /maint/admin.html last;
        }
        proxy_intercept_errors on;
        error_page 502 503 504 =503 /maint/admin.html;
        proxy_pass $frontend_up;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /forgot-password {
        if ($maint_mode != "none") {
            rewrite ^ /maint/admin.html last;
        }
        proxy_intercept_errors on;
        error_page 502 503 504 =503 /maint/admin.html;
        proxy_pass $frontend_up;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /reset-password {
        if ($maint_mode != "none") {
            rewrite ^ /maint/admin.html last;
        }
        proxy_intercept_errors on;
        error_page 502 503 504 =503 /maint/admin.html;
        proxy_pass $frontend_up;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dashboard {
        if ($maint_mode != "none") {
            rewrite ^ /maint/admin.html last;
        }
        proxy_intercept_errors on;
        error_page 502 503 504 =503 /maint/admin.html;
        proxy_pass $frontend_up;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==============================================================
    # Customer portal routes → maintenance page: customer.html
    # ==============================================================
    location /customer {
        if ($maint_mode != "none") {
            rewrite ^ /maint/customer.html last;
        }
        proxy_intercept_errors on;
        error_page 502 503 504 =503 /maint/customer.html;
        proxy_pass $frontend_up;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==============================================================
    # Public routes (/, /about, /contact, /route/*, /houseboat-booking)
    # Cached by nginx — stale content served when frontend is down.
    # Fallback to static page only if cache is completely empty.
    # ==============================================================
    location / {
        # Proxy cache — keeps public pages available during downtime
        proxy_cache public_cache;
        proxy_cache_valid 200 10m;
        proxy_cache_use_stale error timeout http_502 http_503 http_504 updating;
        proxy_cache_background_update on;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_ignore_headers Cache-Control Set-Cookie;
        proxy_hide_header Set-Cookie;

        # Don't cache responses for authenticated users
        proxy_cache_bypass $cookie_ssmspl_access_token $cookie_ssmspl_portal_access_token;
        proxy_no_cache $cookie_ssmspl_access_token $cookie_ssmspl_portal_access_token;

        # Fallback if cache is empty AND frontend is down
        proxy_intercept_errors on;
        error_page 502 503 504 =503 /maint/public-fallback.html;

        proxy_pass $frontend_up;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        include /etc/nginx/conf.d/security-headers.inc;
        add_header X-Cache-Status $upstream_cache_status;
    }
}

# ============================================================
# Backend API — api.carferry.online
# ============================================================
server {
    listen 443 ssl;
    server_name api.carferry.online;

    ssl_certificate /etc/letsencrypt/live/carferry.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/carferry.online/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    client_max_body_size 10M;

    # Dynamic upstream variable (resolved per-request via Docker DNS)
    set $backend_up http://backend:8000;

    # Security headers
    include /etc/nginx/conf.d/security-headers.inc;

    # Health checks (no rate limit)
    location = /health {
        proxy_pass $backend_up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health/backup {
        proxy_pass $backend_up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Login endpoints — stricter rate limit
    location ~ ^/api/auth/login$ {
        limit_req zone=login burst=3 nodelay;
        proxy_pass $backend_up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/portal/auth/login$ {
        limit_req zone=login burst=3 nodelay;
        proxy_pass $backend_up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other API routes
    location / {
        limit_req zone=api burst=50 nodelay;
        proxy_pass $backend_up;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    # Friendly error page when backend is down
    error_page 502 503 504 /50x.json;
    location = /50x.json {
        default_type application/json;
        return 503 '{"detail": "Service temporarily unavailable. Please try again in a moment."}';
    }
}
