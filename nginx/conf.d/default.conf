# Docker DNS resolver — re-resolves container IPs dynamically.
# Without this, nginx caches IPs at startup and breaks when containers restart.
resolver 127.0.0.11 valid=10s ipv6=off;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name carferry.online www.carferry.online api.carferry.online;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend — carferry.online
server {
    listen 443 ssl;
    server_name carferry.online www.carferry.online;

    ssl_certificate /etc/letsencrypt/live/carferry.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/carferry.online/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    client_max_body_size 10M;

    # Dynamic upstream variables (resolved per-request via Docker DNS)
    set $frontend_up http://frontend:3000;
    set $backend_up  http://backend:8000;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_pass $frontend_up;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket for dashboard real-time stats
    location /api/dashboard/ws {
        proxy_pass $backend_up;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Cache static assets
    location /_next/static/ {
        proxy_pass $frontend_up;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images/ {
        proxy_pass $frontend_up;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}

# Backend API — api.carferry.online
server {
    listen 443 ssl;
    server_name api.carferry.online;

    ssl_certificate /etc/letsencrypt/live/carferry.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/carferry.online/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    client_max_body_size 10M;

    # Dynamic upstream variable (resolved per-request via Docker DNS)
    set $backend_up http://backend:8000;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health checks (no rate limit)
    location = /health {
        proxy_pass $backend_up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health/backup {
        proxy_pass $backend_up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Login endpoints — stricter rate limit
    location ~ ^/api/auth/login$ {
        limit_req zone=login burst=3 nodelay;
        proxy_pass $backend_up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/portal/auth/login$ {
        limit_req zone=login burst=3 nodelay;
        proxy_pass $backend_up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other API routes
    location / {
        limit_req zone=api burst=50 nodelay;
        proxy_pass $backend_up;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    # Friendly error page when backend is down
    error_page 502 503 504 /50x.json;
    location = /50x.json {
        default_type application/json;
        return 503 '{"detail": "Service temporarily unavailable. Please try again in a moment."}';
    }
}
